version: '3.8'

services:
  pg_master:
    image: bitnami/postgresql:latest
    container_name: pg_master
    environment:
      - POSTGRESQL_DATABASE=shopdb
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_pass
    ports:
      - '5432:5432'

  pg_replica1:
    image: bitnami/postgresql:latest
    container_name: pg_replica1
    depends_on:
      - pg_master
    environment:
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=pg_master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_pass
    ports:
      - '5433:5432'

  pg_replica2:
    image: bitnami/postgresql:latest
    container_name: pg_replica2
    depends_on:
      - pg_master
    environment:
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=pg_master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_pass
    ports:
      - '5434:5432'
