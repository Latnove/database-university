version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: pg_course
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - '15432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
